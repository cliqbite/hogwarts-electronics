<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shop All — Hogwarts Electronics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root,[data-theme="dark"]{
  --bg:#0f0f0f;--band:#121215;--surface:#151518;--surface-2:#19191d;
  --footer:#0c0c0e;--ph-bg:#0e0e11;--ph-a:#16161b;--ph-b:#101014;
  --mono:#4a4a55;--border:#232329;--border-2:#2a2a31;--border-hover:#34343d;
  --text:#f4f4f6;--text-2:#c9c9d0;--text-3:#a6a6b0;--text-muted:#8a8a94;
  --text-faint:#6a6a74;--nav-bg:rgba(15,15,15,.82);--accent:#fa4b2a;
}
[data-theme="light"]{
  --bg:#f4f4f3;--band:#ffffff;--surface:#ffffff;--surface-2:#f0f0ee;
  --footer:#eeeeec;--ph-bg:#e9e9e6;--ph-a:#e6e6e2;--ph-b:#efefeb;
  --mono:#a8a8a0;--border:#e5e5e1;--border-2:#d8d8d3;--border-hover:#c6c6bf;
  --text:#18181b;--text-2:#3f3f46;--text-3:#52525b;--text-muted:#71717a;
  --text-faint:#a1a1aa;--nav-bg:rgba(255,255,255,.82);--accent:#fa4b2a;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:var(--bg);color:var(--text-2);font-family:system-ui,-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;}
a{text-decoration:none;color:inherit;}
button,input,select{font-family:inherit;}
input{outline:none;}
select{outline:none;cursor:pointer;appearance:none;-webkit-appearance:none;}
::selection{background:rgba(250,75,42,.4);}
.he-link{transition:color .2s ease;}
.he-link:hover{color:var(--text) !important;}
.he-chip{transition:background .18s ease,border-color .18s ease,color .18s ease;cursor:pointer;}
.he-chip:hover{border-color:var(--border-hover) !important;}
.product-card{display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:transform .28s cubic-bezier(.2,.7,.3,1),border-color .28s ease,box-shadow .28s ease;}
.product-card:hover{transform:translateY(-6px);border-color:var(--border-hover);box-shadow:0 20px 44px rgba(0,0,0,.5);}
.cc-tip:hover .cc-tipbox{opacity:1 !important;transform:translateX(-50%) translateY(0) !important;}
.ph-stripe{background:var(--ph-bg);background-image:repeating-linear-gradient(135deg,var(--ph-a) 0 13px,var(--ph-b) 13px 26px);}
</style>
</head>
<body>
<div id="root"></div>

<script>
const ALL_PRODUCTS = [
  { name:"Marvel's Spider-Man 2",        category:"PlayStation", platform:"PS5",            price:249,  originalPrice:null, badge:"New",  img:"SPIDER-MAN 2 / box art" },
  { name:"God of War Ragnarök",           category:"PlayStation", platform:"PS5",            price:219,  originalPrice:279,  badge:"Sale", img:"GOD OF WAR / box art" },
  { name:"EA Sports FC 25",               category:"PlayStation", platform:"PS5",            price:279,  originalPrice:299,  badge:"Sale", img:"FC 25 / box art" },
  { name:"PlayStation 5 Slim (Disc)",     category:"PlayStation", platform:"PS5",            price:2299, originalPrice:null, badge:null,   img:"PS5 SLIM / console shot" },
  { name:"PlayStation 5 Pro Console",     category:"PlayStation", platform:"PS5",            price:2499, originalPrice:null, badge:"New",  img:"PS5 PRO / console shot" },
  { name:"Forza Motorsport",              category:"Xbox",        platform:"Xbox Series X",  price:229,  originalPrice:null, badge:null,   img:"FORZA / box art" },
  { name:"Starfield",                     category:"Xbox",        platform:"Xbox Series X",  price:199,  originalPrice:249,  badge:"Sale", img:"STARFIELD / box art" },
  { name:"Zelda: Tears of the Kingdom",   category:"Nintendo",    platform:"Nintendo Switch", price:239, originalPrice:null, badge:null,   img:"ZELDA TOTK / box art" },
  { name:"Mario Kart 8 Deluxe",           category:"Nintendo",    platform:"Nintendo Switch", price:209, originalPrice:null, badge:null,   img:"MARIO KART 8 / box art" },
  { name:"Razer BlackWidow V4 Keyboard",  category:"PC Gaming",   platform:"PC",             price:599,  originalPrice:null, badge:null,   img:"BLACKWIDOW V4 / product shot" },
  { name:"SteelSeries Arctis Nova 7",     category:"Accessories", platform:"PC",             price:749,  originalPrice:null, badge:null,   img:"ARCTIS NOVA 7 / product shot" },
  { name:"Titan Evo Gaming Chair",        category:"Accessories", platform:"Universal",       price:1499, originalPrice:1799, badge:"Sale", img:"TITAN EVO / product shot" }
];

const CATS   = ["All","PlayStation","Xbox","Nintendo","PC Gaming","Accessories"];
const PLATS  = ["All","PS5","Xbox Series X","Nintendo Switch","PC","Universal"];
const PAYS   = ["VISA","MC","AMEX","TABBY","TAMARA"];

const money = n => 'AED ' + n.toLocaleString('en-US');

let state = {
  cat: 'All', plat: 'All', query: '', sort: 'featured',
  theme: localStorage.getItem('he-theme') || 'dark'
};

function setState(patch) {
  Object.assign(state, patch);
  render();
}

function filtered() {
  const q = state.query.trim().toLowerCase();
  let list = ALL_PRODUCTS.filter(p =>
    (state.cat === 'All'  || p.category === state.cat) &&
    (state.plat === 'All' || p.platform === state.plat) &&
    (!q || p.name.toLowerCase().includes(q))
  );
  if (state.sort === 'low')  list = [...list].sort((a,b) => a.price - b.price);
  if (state.sort === 'high') list = [...list].sort((a,b) => b.price - a.price);
  if (state.sort === 'name') list = [...list].sort((a,b) => a.name.localeCompare(b.name));
  return list;
}

function chipStyle(active) {
  return `text-align:left;border-radius:10px;font-size:13px;font-weight:600;padding:9px 13px;`
       + `display:flex;justify-content:space-between;gap:8px;border:1px solid;`
       + (active ? 'background:var(--accent);border-color:var(--accent);color:#fff;'
                 : 'background:var(--surface-2);border-color:var(--border);color:var(--text-2);');
}
function platStyle(active) {
  return `border-radius:999px;font-size:12.5px;font-weight:600;padding:8px 14px;border:1px solid;`
       + (active ? 'background:var(--accent);border-color:var(--accent);color:#fff;'
                 : 'background:var(--surface-2);border-color:var(--border);color:var(--text-2);');
}

function productCardHTML(p) {
  return `
  <a href="product-detail.html" class="product-card" style="text-decoration:none;">
    <div style="position:relative;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;" class="ph-stripe">
      ${p.badge ? `<div style="position:absolute;top:13px;left:13px;background:var(--accent);color:#fff;font-size:11px;font-weight:700;letter-spacing:.03em;padding:5px 10px;border-radius:999px;text-transform:uppercase;">${p.badge}</div>` : ''}
      <div style="position:absolute;top:11px;right:11px;width:33px;height:33px;border-radius:50%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:15px;cursor:pointer;" onclick="event.preventDefault();this.textContent=this.textContent==='♡'?'♥':'♡'">♡</div>
      <span style="font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:10.5px;color:var(--mono);letter-spacing:.05em;text-align:center;padding:0 18px;line-height:1.5;">${p.img}</span>
    </div>
    <div style="padding:15px 15px 17px;display:flex;flex-direction:column;gap:7px;flex:1;">
      <div style="font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--text-muted);font-weight:600;">${p.platform}</div>
      <div style="font-size:14.5px;line-height:1.35;color:var(--text);font-weight:600;min-height:39px;">${p.name}</div>
      <div style="display:flex;align-items:baseline;gap:9px;margin-top:3px;">
        <span style="font-size:18px;font-weight:700;color:var(--text);">${money(p.price)}</span>
        ${p.originalPrice ? `<span style="font-size:12.5px;color:var(--text-faint);text-decoration:line-through;">${money(p.originalPrice)}</span>` : ''}
      </div>
      <div style="position:relative;margin-top:auto;padding-top:11px;" class="cc-tip">
        <button disabled style="width:100%;border:1px solid var(--border-2);background:var(--surface-2);color:var(--text-muted);font-weight:600;font-size:13px;padding:11px;border-radius:11px;cursor:not-allowed;display:flex;align-items:center;justify-content:center;gap:7px;" onclick="event.preventDefault()">
          <span style="width:6px;height:6px;border-radius:50%;background:#3a3a42;display:inline-block;"></span>Add to cart
        </button>
        <div class="cc-tipbox" style="position:absolute;bottom:calc(100% - 2px);left:50%;transform:translateX(-50%) translateY(6px);background:#000;color:var(--text);font-size:11.5px;font-weight:600;padding:6px 11px;border-radius:8px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .2s ease,transform .2s ease;border:1px solid var(--border-2);">Available soon</div>
      </div>
    </div>
  </a>`;
}

function render() {
  const root = document.getElementById('root');
  root.setAttribute('data-theme', state.theme);
  root.style.cssText = 'background:var(--bg);color:var(--text-2);';

  const list = filtered();
  const hasResults = list.length > 0;

  root.innerHTML = `
    <!-- NAV -->
    <header style="position:sticky;top:0;z-index:50;background:var(--nav-bg);backdrop-filter:saturate(160%) blur(16px);-webkit-backdrop-filter:saturate(160%) blur(16px);border-bottom:1px solid var(--border);">
      <div style="max-width:1200px;margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;gap:28px;">
        <a href="index.html" style="display:flex;align-items:center;gap:10px;flex:none;">
          <div style="width:32px;height:32px;border-radius:9px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:17px;font-family:'Manrope',sans-serif;box-shadow:0 4px 14px rgba(250,75,42,.45);">H</div>
          <div style="font-family:'Manrope',sans-serif;font-weight:700;font-size:16px;color:var(--text);letter-spacing:-.01em;">Hogwarts<span style="color:var(--text-muted);font-weight:600;">Electronics</span></div>
        </a>
        <nav style="display:flex;align-items:center;gap:24px;font-size:14px;font-weight:500;">
          <a href="products.html" class="he-link" style="color:var(--accent);font-weight:600;">Shop All</a>
          <a href="#" class="he-link" style="color:var(--text-2);">PlayStation</a>
          <a href="#" class="he-link" style="color:var(--text-2);">Xbox</a>
          <a href="#" class="he-link" style="color:var(--text-2);">Nintendo</a>
          <a href="#" class="he-link" style="color:var(--text-2);">PC Gaming</a>
          <a href="#" class="he-link" style="color:var(--text-2);">Deals</a>
        </nav>
        <div style="flex:1;"></div>
        <button id="theme-btn" title="Toggle theme" style="width:38px;height:38px;border-radius:10px;background:var(--surface-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text-2);font-size:15px;cursor:pointer;flex:none;">${state.theme === 'dark' ? '☀' : '☾'}</button>
        <a href="#" style="position:relative;width:38px;height:38px;border-radius:10px;background:var(--surface-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text-2);font-size:16px;flex:none;">
          ⛒
          <span style="position:absolute;top:-6px;right:-6px;min-width:18px;height:18px;border-radius:9px;background:var(--accent);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 5px;border:2px solid var(--bg);">0</span>
        </a>
      </div>
    </header>

    <!-- PAGE HEADER -->
    <div style="border-bottom:1px solid var(--border);background:var(--band);">
      <div style="max-width:1200px;margin:0 auto;padding:34px 24px 30px;">
        <div style="font-size:12.5px;color:var(--text-muted);margin-bottom:12px;"><a href="index.html" class="he-link">Home</a> &nbsp;/&nbsp; <span style="color:var(--text-2);">Shop All</span></div>
        <h1 style="font-family:'Manrope',sans-serif;font-weight:800;font-size:34px;letter-spacing:-.02em;color:var(--text);margin:0;">All products</h1>
        <p style="font-size:14px;color:var(--text-muted);margin:8px 0 0;">${list.length} products · Genuine UAE stock · Prices incl. VAT</p>
      </div>
    </div>

    <!-- BODY -->
    <div style="max-width:1200px;margin:0 auto;padding:30px 24px 80px;display:grid;grid-template-columns:236px 1fr;gap:34px;">

      <!-- SIDEBAR -->
      <aside style="display:flex;flex-direction:column;gap:30px;">
        <div>
          <div style="display:flex;align-items:center;gap:9px;background:var(--surface-2);border:1px solid var(--border);border-radius:11px;padding:11px 13px;">
            <span style="font-size:15px;color:var(--text-muted);">⌕</span>
            <input id="search-input" value="${state.query.replace(/"/g,'&quot;')}" placeholder="Search products…" style="border:none;background:transparent;color:var(--text);font-size:13.5px;width:100%;">
          </div>
        </div>
        <div>
          <div style="font-size:11.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:13px;">Category</div>
          <div style="display:flex;flex-direction:column;gap:8px;">
            ${CATS.map(c => {
              const count = c === 'All' ? ALL_PRODUCTS.length : ALL_PRODUCTS.filter(p => p.category === c).length;
              return `<button class="he-chip" data-cat="${c}" style="${chipStyle(c === state.cat)}">${c}<span style="opacity:.6;font-weight:500;">${count}</span></button>`;
            }).join('')}
          </div>
        </div>
        <div>
          <div style="font-size:11.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:13px;">Platform</div>
          <div style="display:flex;flex-wrap:wrap;gap:8px;">
            ${PLATS.map(p => `<button class="he-chip" data-plat="${p}" style="${platStyle(p === state.plat)}">${p}</button>`).join('')}
          </div>
        </div>
      </aside>

      <!-- GRID -->
      <div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;">
          <div style="font-size:13.5px;color:var(--text-muted);">Showing <span style="color:var(--text);font-weight:600;">${list.length}</span> of ${ALL_PRODUCTS.length}</div>
          <div style="display:flex;align-items:center;gap:9px;">
            <span style="font-size:13px;color:var(--text-muted);">Sort</span>
            <div style="position:relative;">
              <select id="sort-select" style="background:var(--surface-2);border:1px solid var(--border);color:var(--text);font-size:13px;padding:9px 36px 9px 12px;border-radius:10px;cursor:pointer;">
                <option value="featured" ${state.sort==='featured'?'selected':''}>Featured</option>
                <option value="low"      ${state.sort==='low'?'selected':''}>Price: Low to High</option>
                <option value="high"     ${state.sort==='high'?'selected':''}>Price: High to Low</option>
                <option value="name"     ${state.sort==='name'?'selected':''}>Name A–Z</option>
              </select>
              <span style="position:absolute;right:10px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--text-muted);font-size:11px;">▾</span>
            </div>
          </div>
        </div>

        ${hasResults
          ? `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:18px;">${list.map(productCardHTML).join('')}</div>`
          : `<div style="text-align:center;padding:80px 20px;border:1px dashed var(--border-2);border-radius:18px;">
               <div style="font-family:'Manrope',sans-serif;font-size:19px;font-weight:700;color:var(--text);">No products found</div>
               <div style="font-size:13.5px;color:var(--text-muted);margin-top:8px;">Try a different category, platform or search term.</div>
               <button id="clear-btn" style="margin-top:20px;background:var(--accent);color:#fff;border:none;font-weight:600;font-size:13.5px;padding:11px 22px;border-radius:11px;cursor:pointer;">Clear all filters</button>
             </div>`}
      </div>
    </div>

    <!-- SLIM FOOTER -->
    <footer style="border-top:1px solid var(--border);background:var(--footer);">
      <div style="max-width:1200px;margin:0 auto;padding:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="width:28px;height:28px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px;font-family:'Manrope',sans-serif;">H</div>
          <span style="font-size:12.5px;color:var(--text-faint);">© 2026 Hogwarts Electronics LLC · Dubai, UAE</span>
        </div>
        <div style="display:flex;gap:8px;">
          ${PAYS.map(p => `<div style="height:26px;padding:0 9px;border-radius:6px;background:var(--surface-2);border:1px solid var(--border);display:flex;align-items:center;font-size:10px;font-weight:700;color:var(--text-muted);letter-spacing:.03em;">${p}</div>`).join('')}
        </div>
      </div>
    </footer>
  `;

  // events
  document.getElementById('theme-btn').onclick = () => {
    const t = state.theme === 'dark' ? 'light' : 'dark';
    localStorage.setItem('he-theme', t);
    setState({ theme: t });
  };

  const searchInput = document.getElementById('search-input');
  searchInput.oninput = e => setState({ query: e.target.value });
  searchInput.focus();
  searchInput.selectionStart = searchInput.selectionEnd = searchInput.value.length;

  document.querySelectorAll('[data-cat]').forEach(btn => {
    btn.onclick = () => setState({ cat: btn.dataset.cat });
  });
  document.querySelectorAll('[data-plat]').forEach(btn => {
    btn.onclick = () => setState({ plat: btn.dataset.plat });
  });

  const sortSel = document.getElementById('sort-select');
  if (sortSel) sortSel.onchange = e => setState({ sort: e.target.value });

  const clearBtn = document.getElementById('clear-btn');
  if (clearBtn) clearBtn.onclick = () => setState({ cat:'All', plat:'All', query:'', sort:'featured' });
}

render();
</script>
</body>
</html>
